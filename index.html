<html lang="en">
<head>

<title>Antimicrobial Dosing Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f7fa;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;--faint:#94a3b8;--accent:#2563eb;--accent-dk:#1e3a5f;--green-bg:#f0fdf4;--green-b:#bbf7d0;--green-t:#166534;--amber-bg:#fef3c7;--amber-b:#fcd34d;--amber-t:#92400e;--red-bg:#fef2f2;--red-b:#fecaca;--red-t:#991b1b;--blue-bg:#eff6ff;--blue-b:#93c5fd;--blue-t:#1e40af;--cyan-bg:#f0f9ff;--cyan-b:#bae6fd;--mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.5}.container{max-width:640px;margin:0 auto;padding:0 12px 32px}
.header{text-align:center;padding:24px 0 16px}.header-badge{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--accent-dk),var(--accent));padding:8px 22px;border-radius:99px;margin-bottom:8px}.header-badge .ic{font-size:17px}.header-badge .lb{color:#fff;font-weight:700;font-size:13.5px;letter-spacing:.6px}.header-sub{font-size:11px;color:var(--faint);font-weight:500}
.trow{display:flex;gap:8px;margin-bottom:14px}.tgrp{flex:1;display:flex;background:#f1f5f9;border-radius:10px;padding:3px;border:1px solid var(--border)}.tbtn{flex:1;padding:9px 4px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:12px;letter-spacing:.4px;text-transform:uppercase;background:0 0;color:var(--faint);transition:all .15s;font-family:var(--sans)}.tbtn.act{background:#fff;color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.08)}.tbtn.actc{background:#fff;color:#0891b2;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card{background:var(--card);border-radius:10px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden}.ch{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}.ch .ic{font-size:15px}.ch .ti{font-weight:700;font-size:12.5px;color:var(--text);letter-spacing:.3px}.cb{padding:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.s2{grid-column:span 2}label.fl{display:block;font-size:10.5px;font-weight:700;color:#475569;margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase}input,select{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid #cbd5e1;font-size:14px;outline:0;background:#f8fafc;font-family:var(--sans);box-sizing:border-box;transition:border-color .2s}input:focus,select:focus{border-color:var(--accent)}select{cursor:pointer}.req{color:#dc2626}
.brow{display:flex;gap:10px;margin-bottom:14px}.bcalc{flex:1;padding:13px 0;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px;letter-spacing:.5px;color:#fff;background:linear-gradient(135deg,#1e40af,#3b82f6);box-shadow:0 2px 8px rgba(37,99,235,.25);transition:all .2s;font-family:var(--sans)}.bcalc:disabled{background:#94a3b8;opacity:.5;cursor:default}.breset{padding:13px 20px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-weight:600;font-size:13px;background:#fff;color:var(--muted);font-family:var(--sans)}
.badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:600}.bg{background:#dcfce7;color:#166534;border:1px solid #86efac}.ba{background:var(--amber-bg);color:var(--amber-t);border:1px solid var(--amber-b)}.br{background:var(--red-bg);color:var(--red-t);border:1px solid var(--red-b)}
.results{animation:fi .3s ease}@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fbox{font-family:var(--mono);font-size:12.5px;color:#334155;background:var(--cyan-bg);padding:12px;border-radius:8px;border:1px solid var(--cyan-b);margin-bottom:10px;word-break:break-word}.cv{font-size:28px;font-weight:700;color:#0c4a6e;font-family:var(--mono)}.cu{font-size:12px;color:var(--muted);margin:0 4px}.crow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.dgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}.dc{background:var(--green-bg);padding:10px;border-radius:8px;text-align:center;border:1px solid var(--green-b)}.dc .dl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:3px}.dc .dv{font-weight:700;color:var(--green-t);line-height:1.3}.dc .dv.m{font-family:var(--mono);font-size:16px}.dc .dv.n{font-size:12px}.dm{font-size:12px;color:#475569;margin-bottom:4px}
.ampbox{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;margin-top:10px;background:linear-gradient(135deg,#faf5ff,#f0f9ff);border:1.5px solid #c4b5fd;flex-wrap:wrap}.ampbox .amp-icon{font-size:18px;flex-shrink:0}.ampbox .amp-main{font-family:var(--mono);font-size:18px;font-weight:700;color:#5b21b6}.ampbox .amp-detail{font-size:11.5px;color:#6b21a8;line-height:1.4;flex:1;min-width:120px}
.al{display:flex;align-items:flex-start;gap:6px;padding:8px 12px;border-radius:8px;margin-top:8px;font-size:12px;line-height:1.5}.ala{background:var(--amber-bg);border:1px solid var(--amber-b);color:var(--amber-t);font-weight:600}.alb{background:var(--blue-bg);border:1px solid var(--blue-b);color:var(--blue-t)}.ai{flex-shrink:0}
.rr{padding:8px 12px;border-radius:8px;margin-bottom:6px}.rr.ra{background:#fffbeb;border:1.5px solid #f59e0b}.rr.ri{background:#f9fafb;border:1px solid #e5e7eb;opacity:.55}.rl{font-size:11px;font-weight:700}.rl.ra{color:var(--amber-t)}.rl.ri{color:#6b7280}.radj{font-size:12px;margin-top:2px}
.mt{font-size:12px;color:#475569;line-height:1.7}.wb{font-size:12px;color:var(--red-t);line-height:1.7;background:var(--red-bg);padding:12px;border-radius:8px;border:1px solid var(--red-b)}
.sf{background:linear-gradient(135deg,#1e293b,#334155);border-radius:10px;padding:16px;color:#fff}.sft{font-size:12px;font-weight:700;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}.sfi{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px}.sfb{font-size:9px;color:#fbbf24;margin-top:3px}.sfx{font-size:11px;color:#e2e8f0;line-height:1.5}.sff{margin-top:12px;padding:8px 12px;background:rgba(251,191,36,.1);border-radius:8px;border:1px solid rgba(251,191,36,.3);font-size:10px;color:#fcd34d;font-weight:600;text-align:center;letter-spacing:.3px}
.ni{margin-top:6px;padding:6px 10px;background:var(--blue-bg);border-radius:6px;border:1px solid #bfdbfe;font-size:11px;color:var(--blue-t);line-height:1.5}.hid{display:none}
</style>
</head>
<body>
<div class="container">
<div class="header"><div class="header-badge"><span class="ic">💊</span><span class="lb">ANTIMICROBIAL DOSING CALCULATOR</span></div></div>

<div class="trow">
<div class="tgrp" id="mG"><button class="tbtn" data-m="pediatric" onclick="setMode('pediatric')">🧒 Pediatric</button><button class="tbtn act" data-m="adult" onclick="setMode('adult')">🧑 Adult</button></div>
<div class="tgrp" id="gG"><button class="tbtn" data-g="schwartz" onclick="setGfr('schwartz')">Schwartz</button><button class="tbtn actc" data-g="cg" onclick="setGfr('cg')">Cockcroft-Gault</button></div>
</div>

<div class="card"><div class="ch"><span class="ic">🏥</span><span class="ti">PATIENT DATA</span></div><div class="cb"><div class="g2">
<div><label class="fl">Weight (kg)</label><input type="number" id="wt" placeholder="e.g. 25" min="0" step="0.1"></div>
<div><label class="fl">Age (years)</label><input type="number" id="ag" placeholder="e.g. 8" min="0" step="0.1"></div>
<div id="hF"><label class="fl">Height (cm) <span class="req">*</span></label><input type="number" id="ht" placeholder="Required for Schwartz" min="0" step="0.1"></div>
<div><label class="fl">Sex</label><select id="sx"><option value="male">Male</option><option value="female">Female</option></select></div>
<div id="sF"><label class="fl">Serum Creatinine (mg/dL)</label><input type="number" id="sc" placeholder="e.g. 0.5" min="0" step="0.01"></div>
</div></div></div>

<div class="card"><div class="ch"><span class="ic">💉</span><span class="ti">DRUG & INDICATION</span></div><div class="cb">
<div style="margin-bottom:10px"><label class="fl">Antibiotic / Antifungal</label><select id="dS" onchange="onDC()"><option value="">— Select Drug —</option></select></div>
<div><label class="fl">Indication</label><select id="iS"><option value="">— Select Indication —</option></select></div>
<div id="iN" class="ni hid"></div>
</div></div>

<div class="brow"><button class="bcalc" id="cB" onclick="calc()">CALCULATE DOSE</button><button class="breset" onclick="rst()">Reset</button></div>
<div id="res" class="hid"></div>
</div>

<script>

"Ceftriaxone":{mg:1000,label:"1 g/vial",unit:"vial(s)"},
"Ceftazidime":{mg:1000,label:"1 g/vial",unit:"vial(s)"},

"Linezolid":{mg:600,label:"600 mg/300 mL bag",unit:"bag(s)"},
"TMP-SMX":{mg:80,label:"80/400 mg per 5 mL amp",unit:"amp(s)",isTmpSmx:true},
"Polymyxin B":{iu:500000,label:"500,000 IU/vial",unit:"vial(s)",isIU:true},
"Colistin (CMS)":{mg:30,label:"1 MIU/vial (≈30 mg CBA)",unit:"vial(s)",isCBA:true},
"Ciprofloxacin":{mg:200,label:"200 mg/100 mL bag",unit:"bag(s)"},
"Levofloxacin":{mg:500,label:"500 mg/100 mL bag",unit:"bag(s)"},
"Daptomycin":{mg:500,label:"500 mg/vial",unit:"vial(s)"},
"Ertapenem":{mg:1000,label:"1 g/vial",unit:"vial(s)"},
"Clindamycin":{mg:600,label:"600 mg/4 mL amp",unit:"amp(s)"},
"Ampicillin-Sulbactam":{mg:3000,label:"3 g/vial (2g ampi + 1g sulb)",unit:"vial(s)"},
"Ceftazidime-Avibactam":{mg:2500,label:"2.5 g/vial (2g ceftaz + 0.5g avib)",unit:"vial(s)"},
"Aztreonam":{mg:1000,label:"1 g/vial",unit:"vial(s)"},
"Tigecycline":{mg:50,label:"50 mg/vial",unit:"vial(s)"}
};

function calcVials(drugName,dose,unit){
  const v=VIALS[drugName];
  if(!v||!dose)return null;
  if(v.isIU){
    const n=dose/v.iu;
    const whole=Math.ceil(n*100)/100;
    return{count:whole,label:v.label,unit:v.unit,exact:n,rounded:Math.ceil(n)};
  }
  const perVial=v.mg;
  const n=dose/perVial;
  const whole=Math.ceil(n*100)/100;
  return{count:whole,label:v.label,unit:v.unit,exact:n,rounded:Math.ceil(n),isTmpSmx:v.isTmpSmx||false};
}

const D={
"Vancomycin":{cat:"Glycopeptide",rt:["IV"],ind:{"Bacteremia":{p:{pk:15,f:"q6h",mx:750},a:{pk:20,f:"q8-12h",mx:2000}},"Endocarditis":{p:{pk:15,f:"q6h",mx:750},a:{pk:20,f:"q8-12h",mx:2000}},"CNS Infection":{p:{pk:15,f:"q6h",mx:750},a:{pk:20,f:"q8-12h",mx:2000},nt:"Target AUC upper range (500-600). Consider intrathecal if poor response."},"Pneumonia":{p:{pk:15,f:"q6h",mx:750},a:{pk:15,f:"q8-12h",mx:2000}},"Skin/Soft Tissue":{p:{pk:15,f:"q6h",mx:750},a:{pk:15,f:"q12h",mx:2000}},"Bone/Joint":{p:{pk:15,f:"q6h",mx:750},a:{pk:20,f:"q8-12h",mx:2000},nt:"Prolonged course (4-6 wk). AUC-guided essential."},"Febrile Neutropenia":{p:{pk:15,f:"q6h",mx:750},a:{pk:15,f:"q8-12h",mx:2000}}},ra:[{l:"CrCl > 50",a:"No adjustment — dose by AUC"},{l:"CrCl 30-50",a:"q12-24h or per AUC"},{l:"CrCl 10-29",a:"q24-48h or per AUC"},{l:"CrCl < 10 / HD",a:"Per levels / AUC-guided only"}],mon:"AUC/MIC target 400–600 mg·h/L (MIC ≤1). Trough-only discouraged (2020 ASHP/IDSA/PIDS). 2-point AUC preferred. SCr q48-72h.",wrn:"Nephrotoxicity ↑ with AUC >600. Red Man Syndrome — infuse ≥1h. Ototoxicity rare."},
"Gentamicin":{cat:"Aminoglycoside",rt:["IV"],ind:{"Bacteremia":{p:{pk:2.5,f:"q8h",mx:120},a:{pk:7,f:"q24h (extended-interval)",mx:560}},"Endocarditis (synergy)":{p:{pk:1,f:"q8h",mx:80},a:{pk:1,f:"q8h",mx:120},nt:"Synergy: target peak 3–4 mcg/mL. Short courses (2 wk)."},"UTI":{p:{pk:2.5,f:"q8h",mx:120},a:{pk:5,f:"q24h",mx:400}},"Intra-abdominal":{p:{pk:2.5,f:"q8h",mx:120},a:{pk:5,f:"q24h",mx:500}},"Febrile Neutropenia":{p:{pk:2.5,f:"q8h",mx:120},a:{pk:7,f:"q24h (extended-interval)",mx:560}}},ra:[{l:"CrCl > 60",a:"Standard dosing"},{l:"CrCl 40-59",a:"q12h (conventional) or extend interval"},{l:"CrCl 20-39",a:"q24h or per levels"},{l:"CrCl < 20",a:"Per levels only"}],mon:"Extended-interval: peak 15–20, trough <1. Conventional: peak 5–10, trough <2. Synergy: peak 3–4. SCr q48-72h.",wrn:"Nephrotoxicity, ototoxicity (vestibular > cochlear). Avoid concomitant nephrotoxins."},

"Meropenem":{cat:"Carbapenem",rt:["IV"],ind:{"Bacteremia":{p:{pk:20,f:"q8h",mx:1000},a:{fx:1000,f:"q8h",mx:2000}},"Pneumonia":{p:{pk:20,f:"q8h",mx:1000},a:{fx:1000,f:"q8h",mx:2000}},"Intra-abdominal":{p:{pk:20,f:"q8h",mx:1000},a:{fx:1000,f:"q8h",mx:2000}},"CNS Infection":{p:{pk:40,f:"q8h",mx:2000},a:{fx:2000,f:"q8h",mx:2000},nt:"CNS: maximum dosing. Consider extended infusion (3h)."},"UTI":{p:{pk:20,f:"q8h",mx:1000},a:{fx:1000,f:"q8h",mx:1000}},"Febrile Neutropenia":{p:{pk:20,f:"q8h",mx:1000},a:{fx:1000,f:"q8h",mx:2000}},"Skin/Soft Tissue":{p:{pk:20,f:"q8h",mx:1000},a:{fx:500,f:"q8h",mx:1000}}},ra:[{l:"CrCl > 50",a:"No adjustment"},{l:"CrCl 26-50",a:"Standard dose q12h"},{l:"CrCl 10-25",a:"50% dose q12h"},{l:"CrCl < 10",a:"50% dose q24h"}],mon:"SCr q48-72h. Seizure risk in CNS disease / renal impairment.",wrn:"Seizure risk. ↓ Valproic acid levels — avoid combination. Consider extended infusion (3h)."},
"Piperacillin-Tazobactam":{cat:"BL+Inhibitor",rt:["IV"],ind:{"Pneumonia":{p:{pk:100,f:"q6-8h",mx:4000},a:{fx:4500,f:"q6h",mx:4500},nt:"Ped dose = piperacillin component."},"Intra-abdominal":{p:{pk:100,f:"q8h",mx:4000},a:{fx:4500,f:"q6h",mx:4500}},"UTI":{p:{pk:100,f:"q8h",mx:4000},a:{fx:4500,f:"q8h",mx:4500}},"Skin/Soft Tissue":{p:{pk:100,f:"q8h",mx:4000},a:{fx:4500,f:"q6h",mx:4500}},"Febrile Neutropenia":{p:{pk:100,f:"q6h",mx:4000},a:{fx:4500,f:"q6h",mx:4500}},"Bacteremia":{p:{pk:100,f:"q6h",mx:4000},a:{fx:4500,f:"q6h",mx:4500}}},ra:[{l:"CrCl > 40",a:"No adjustment"},{l:"CrCl 20-40",a:"3.375 g q6h or 4.5 g q8h"},{l:"CrCl < 20",a:"2.25 g q6h or 3.375 g q8h"},{l:"HD",a:"2.25 g q8h + extra dose after HD"}],mon:"SCr q48-72h. CBC prolonged use. Consider extended infusion (4h).",wrn:"Possible ↑ nephrotoxicity with vancomycin. Consider extended infusion (4h)."},

function setGfr(g){S.gfr=g;uT();uL();cR()}
function uT(){document.querySelectorAll('#mG .tbtn').forEach(b=>{b.className='tbtn'+(b.dataset.m===S.mode?' act':'')});document.querySelectorAll('#gG .tbtn').forEach(b=>{b.className='tbtn'+(b.dataset.g===S.gfr?' actc':'')})}
function uL(){const n=S.gfr==='schwartz';document.getElementById('hF').classList.toggle('hid',!n);document.getElementById('sF').className=n?'':'s2'}

// ═══ POPULATE ═══
(function(){const s=document.getElementById('dS');Object.keys(D).sort().forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d+' ('+D[d].cat+')';s.appendChild(o)})})();
function onDC(){const d=document.getElementById('dS').value,s=document.getElementById('iS');s.innerHTML='<option value="">— Select Indication —</option>';document.getElementById('iN').classList.add('hid');cR();if(!d||!D[d])return;Object.keys(D[d].ind).forEach(i=>{const o=document.createElement('option');o.value=i;o.textContent=i;s.appendChild(o)});s.onchange=function(){const n=document.getElementById('iN'),ind=D[d]?.ind[s.value];if(ind&&ind.nt){n.textContent='ℹ️ '+ind.nt;n.classList.remove('hid')}else n.classList.add('hid');cR()}}
function cR(){document.getElementById('res').classList.add('hid')}

// ═══ CALC ═══
function gfr(age,wt,sex,scr,method,ht){
  if(method==='schwartz'){const k=age<1?.45:(age<=12?.55:(sex==='male'?.7:.55));const g=(k*ht)/scr;return{v:Math.round(g*10)/10,fm:'Schwartz: ('+k+' × '+ht+' cm) / '+scr+' = '+g.toFixed(1)+' mL/min/1.73m²',lb:'Bedside Schwartz',un:'mL/min/1.73m²'}}
  const f=sex==='female'?.85:1;const c=((140-age)*wt)/(72*scr)*f;return{v:Math.round(c*10)/10,fm:'CG: ((140 − '+age+') × '+wt+') / (72 × '+scr+')'+(sex==='female'?' × 0.85':'')+' = '+c.toFixed(1)+' mL/min',lb:'Cockcroft-Gault',un:'mL/min'}
}
function cDose(dd,ind,wt,mode){
  const i=dd.ind[ind];if(!i)return null;const p=mode==='pediatric'?i.p:i.a;const u=p.u||'mg';
  let dose,daily=false;
  if(p.pk)dose=Math.round(p.pk*wt);else if(p.pkD){dose=Math.round(p.pkD*wt);daily=true}else if(p.fx)dose=p.fx;else dose=null;
  let cap=false;if(dose&&p.mx&&dose>p.mx){dose=p.mx;cap=true}
  return{dose,freq:p.f,mx:p.mx,cap,u,nt:i.nt||'',daily,pk:p.pk||p.pkD||null}
}

function calc(){
  const wt=parseFloat(document.getElementById('wt').value),ag=parseFloat(document.getElementById('ag').value),sc=parseFloat(document.getElementById('sc').value),ht=parseFloat(document.getElementById('ht').value)||0,sex=document.getElementById('sx').value,dn=document.getElementById('dS').value,ind=document.getElementById('iS').value;
  if(!wt||(!ag&&ag!==0)||!sc||!dn||!ind)return;if(isNaN(wt)||isNaN(ag)||isNaN(sc)||wt<=0||ag<0||sc<=0)return;if(S.gfr==='schwartz'&&(!ht||ht<=0))return;
  const cr=gfr(ag,wt,sex,sc,S.gfr,ht),dd=D[dn],dr=cDose(dd,ind,wt,S.mode);if(!dr)return;

  // Vial calc
  let ampHtml='';
  const vialInfo=calcVials(dn,dr.dose,dr.u);
  if(vialInfo){
    const isExact=Number.isInteger(vialInfo.exact);
    const dispCount=isExact?vialInfo.exact:vialInfo.exact.toFixed(2);
    let detail='';
    if(vialInfo.isTmpSmx){
      const mlPerAmp=5;
      const totalMl=vialInfo.exact*mlPerAmp;
      detail='= '+dispCount+' '+vialInfo.unit+' ('+totalMl.toFixed(1)+' mL) per administration<br><small style="color:#7c3aed">Presentation: '+vialInfo.label+'</small>';
    } else {
      detail='= '+dispCount+' '+vialInfo.unit+' per '+(dr.daily?'day':'administration')+'<br><small style="color:#7c3aed">Presentation: '+vialInfo.label+'</small>';
    }
    ampHtml='<div class="ampbox"><span class="amp-icon">💉</span><span class="amp-main">'+vialInfo.rounded+' '+vialInfo.unit+'</span><span class="amp-detail">'+detail+'</span></div>';
  }

  const v=cr.v,bc=v>=60?'bg':v>=30?'ba':'br',bt=v>=90?'Normal':v>=60?'Mild ↓':v>=30?'Moderate ↓':v>=15?'Severe ↓':'Critical';
  let rH='';dd.ra.forEach(r=>{let ac=false;if(dd.ra.length===1)ac=true;else{const rng=r.l.match(/(\d+)\s*[-–]\s*(\d+)/),gt=r.l.match(/>\s*(\d+)/),lt=r.l.match(/<\s*(\d+)/),le=r.l.match(/≤\s*(\d+)/);if(rng&&!gt)ac=v>=parseFloat(rng[1])&&v<=parseFloat(rng[2]);else if(gt&&!rng)ac=v>parseFloat(gt[1]);else if(le)ac=v<=parseFloat(le[1]);else if(lt)ac=v<parseFloat(lt[1]);else if(r.l.toLowerCase().includes('all'))ac=true}const c=ac?'ra':'ri';rH+='<div class="rr '+c+'"><div class="rl '+c+'">'+r.l+(ac?' ← CURRENT':'')+'</div><div class="radj" style="color:'+(ac?'#78350f':'#6b7280')+'">'+r.a+'</div></div>'});
  const dD=dr.dose!=null?dr.dose.toLocaleString()+' '+dr.u:'See notes',dL=dr.daily?'Daily Dose':'Dose / Admin',pK=dr.pk?' · <b>Per-kg:</b> '+dr.pk+' '+dr.u+'/kg'+(dr.daily?'/day':''):'';
  let aH='';if(dr.cap)aH+='<div class="al ala"><span class="ai">⚠️</span><span>Capped at max: '+(dr.mx?dr.mx.toLocaleString():'')+' '+dr.u+(dr.daily?'/day':'/dose')+'</span></div>';if(dr.nt)aH+='<div class="al alb"><span class="ai">ℹ️</span><span>'+dr.nt+'</span></div>';

  document.getElementById('res').innerHTML=`
<div class="card"><div class="ch" style="background:linear-gradient(90deg,#0891b208,transparent)"><span class="ic">🧪</span><span class="ti">RENAL FUNCTION — ${cr.lb}</span></div><div class="cb"><div class="fbox">${cr.fm}</div><div class="crow"><span class="cv">${cr.v}</span><span class="cu">${cr.un}</span><span class="badge ${bc}">${bt}</span></div></div></div>
<div class="card"><div class="ch" style="background:linear-gradient(90deg,#05966908,transparent)"><span class="ic">📋</span><span class="ti">REGIMEN — ${dn} → ${ind}</span></div><div class="cb">
<div class="dgrid"><div class="dc"><div class="dl">Drug</div><div class="dv n">${dn}</div></div><div class="dc"><div class="dl">${dL}</div><div class="dv m">${dD}</div></div><div class="dc"><div class="dl">Frequency</div><div class="dv n">${dr.freq}</div></div></div>
<div class="dm"><b>Route:</b> ${dd.rt.join(' / ')} · <b>Mode:</b> ${S.mode==='pediatric'?'Pediatric':'Adult'}${pK}</div>
${ampHtml}${aH}
</div></div>
<div class="card"><div class="ch" style="background:linear-gradient(90deg,#d9770608,transparent)"><span class="ic">⚙️</span><span class="ti">RENAL ADJUSTMENT</span></div><div class="cb">${rH}</div></div>
<div class="card"><div class="ch" style="background:linear-gradient(90deg,#7c3aed08,transparent)"><span class="ic">📊</span><span class="ti">MONITORING</span></div><div class="cb"><div class="mt">${dd.mon}</div></div></div>
<div class="card"><div class="ch" style="background:linear-gradient(90deg,#dc262608,transparent)"><span class="ic">🚩</span><span class="ti">WARNINGS</span></div><div class="cb"><div class="wb">${dd.wrn}</div></div></div>
<div class="sf"><div class="sft">🛡️ SAFETY CHECK</div>${["Renal function changes since last creatinine?","Concomitant nephrotoxins (aminoglycosides, NSAIDs, contrast, amphotericin)?","Weight changes (critically ill / fluid shifts)?","Drug interactions reviewed (CYP for azoles, QTc)?","Allergy history confirmed?"].map(q=>'<div class="sfi"><span class="sfb">▸</span><span class="sfx">'+q+'</span></div>').join('')}<div class="sff">⚕️ DECISION SUPPORT TOOL — NOT A REPLACEMENT FOR CLINICAL JUDGEMENT</div></div>`;
  const el=document.getElementById('res');el.classList.remove('hid');el.scrollIntoView({behavior:'smooth',block:'start'});
}
function rst(){['wt','ag','ht','sc'].forEach(id=>document.getElementById(id).value='');document.getElementById('sx').value='male';document.getElementById('dS').value='';document.getElementById('iS').innerHTML='<option value="">— Select Indication —</option>';document.getElementById('iN').classList.add('hid');cR()}
uL();
</script>
</body>
</html>
